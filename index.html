<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Pokemon_yay</title>
  </head>

  <body class="min-h-screen flex items-center justify-center">
    <main class="w-full max-w-3xl px-4 py-10 text-center">
      <h1 class="text-4xl sm:text-5xl font-bold">Pokemon Finder</h1>

      <p class="mt-3">Find your favorite Pokémon on this website.</p>

      <!-- Search -->
      <div
        class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-4"
      >
        <input
          id="txtbox"
          placeholder="Enter Pokémon name"
          class="w-full sm:w-80 px-4 py-3"
        />

        <button onclick="fetchPokemon()" class="px-6 py-3">Search</button>
      </div>

      <!-- Image -->
      <div class="mt-8 flex justify-center">
        <img id="pokemonImage" class="hidden w-64 sm:w-80" />
      </div>

      <!-- Types -->
      <div
        id="typesContainer"
        class="mt-6 flex flex-wrap justify-center gap-3"
      ></div>

      <!-- Stats -->
      <h2 id="attack" class="mt-6 text-xl"></h2>
    </main>

    <script src="index.js"></script>
  </body>
</html>
